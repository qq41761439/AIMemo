services:
  - type: web
    name: aimemo-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run build && npm run prisma:push
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: DATA_STORE
        value: prisma
      - key: AUTH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 30d
      - key: REFRESH_TOKEN_DAYS
        value: "30"
      - key: EMAIL_CODE_TTL_MINUTES
        value: "10"
      - key: FREE_MONTHLY_SUMMARY_LIMIT
        value: "30"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: LLM_BASE_URL
        value: https://api.deepseek.com
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: deepseek-v4-flash
      - key: WECHAT_MINI_PROGRAM_APP_ID
        sync: false
      - key: WECHAT_MINI_PROGRAM_APP_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: aimemo-postgres
          property: connectionString

databases:
  - name: aimemo-postgres
    region: singapore
    plan: free
    databaseName: aimemo
