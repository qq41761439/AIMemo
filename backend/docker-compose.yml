services:
  postgres:
    image: postgres:16-alpine
    container_name: aimemo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aimemo
      POSTGRES_PASSWORD: aimemo
      POSTGRES_DB: aimemo
    ports:
      - "5432:5432"
    volumes:
      - aimemo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimemo -d aimemo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  aimemo_postgres_data:
