name: aimemo
description: A local-first Flutter desktop app for todos and AI-generated daily, weekly, monthly, and yearly summaries.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  date_picker_plus: ^7.0.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^10.1.0
  http: ^1.2.2
  path: ^1.9.0
  path_provider: ^2.1.4
  sqflite_common_ffi: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
