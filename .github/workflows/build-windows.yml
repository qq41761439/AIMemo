name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$' | Select-Object -First 1
          $version = $versionLine.Matches[0].Groups[1].Value.Trim().Split('+')[0]
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $languageFile = "installer\windows\ChineseSimplified.isl"
          if (-not (Test-Path $languageFile)) {
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile $languageFile
          }
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          Push-Location "installer\windows"
          & $iscc "aimemo.iss" "/DMyAppVersion=${{ steps.version.outputs.version }}"
          Pop-Location

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AIMemoSetup-${{ steps.version.outputs.version }}
          path: dist/windows/AIMemoSetup-${{ steps.version.outputs.version }}.exe
